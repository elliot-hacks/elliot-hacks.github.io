# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Elliot Hacks
email: thisguyhack@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Awesome Cyber Security blog
  Check out for News and Write ups
keywords:
  - "Elliot Jamhuri Nkwama"
  - "Elliot Nkwama"
  - "elliot-hacks"
  - "Cyber Security"
  - "Cyber Security blog"
  - "Miscelenious"
  - "Penetration Testing"
  - "Reverse Engineering"
  - "Android Penetration Testing"
  - "Forensics"
  - "OSINT"
  - "Active Directory"
  - "Pwntilldawn"
  - "Lets defend"
  - "Hackthebox"
  - "Tryhackme"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://elliothacks.com" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  elliot-hacks
twitter_username: elliotH4cks
instagram_username: elliot.nkwama
facebook_username: thisguyhack


# Author Settings
author:
  name: "Elliot Jamhuri Nkwama"
  roles: ["Penetration Tester", "Web Developer", "Android Developer", "System Architect"]
  email: "thisguyhack@gmail.com"
  phone: "+255 786 410188"
  address: "Mbeya, Tanzania"
  github: "@elliot-hacks"
  github_url: "https://github.com/elliot-hacks"
  cv_url: "/path/to/your/cv.pdf"
  about: "Welcome to my blog! My name is Elliot Jamhuri Nkwama, and I'm a passionate cybersecurity enthusiast..."
  stats:
    - { label: "Years of", subtitle: "Experience", value: 2 }
    - { label: "Cyber Security", subtitle: "Publications", value: 20, plus: true }
    - { label: "Complete", subtitle: "Projects", value: 30, plus: true }

# Social Links
social_links:
  - { icon: "twitter", url: "https://twitter.com/elliotH4cks" }
  - { icon: "facebook-f", url: "https://facebook.com/thisguyhack" }
  - { icon: "linkedin-in", url: "https://linkedin.com/in/elliot-hacks" }
  - { icon: "instagram", url: "https://instagram.com/elliot.nkwama" }

# Navigation
navigation:
  - { name: "Home", link: "/" }
  - { name: "About", link: "/about" }
  - { name: "Writeups", link: "/writeups" }
  - { name: "Contact", link: "#contact" }


# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
