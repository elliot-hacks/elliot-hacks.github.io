---
layout: default
---

<!-- Spinner -->
<div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
  <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
    <span class="sr-only">Loading...</span>
  </div>
</div>

<div class="container">
  <div class="row g-5">
    <!-- Left Column (Profile) -->
    <div class="col-lg-4 sticky-lg-top vh-100">
      <div class="d-flex flex-column h-100 text-center overflow-auto shadow">
        <img class="w-100 img-fluid mb-4" src="{{ site.baseurl }}/assets/img/elliot-hacks.jpg" alt="Elliot Jamhuri Nkwama">
        <h1 class="text-primary mt-2">{{ site.author.name }}</h1>
        
        <div class="mb-4" style="height: 22px;">
          <h4 class="typed-text-output d-inline-block text-light"></h4>
          <div class="typed-text d-none">{{ site.author.roles | join: ', ' }}</div>
        </div>
        
        <div class="d-flex justify-content-center mt-auto mb-3">
          {% include social-links.html %}
        </div>
        
        <div class="d-flex align-items-end justify-content-between border-top">
          <a href="{{ site.author.cv_url }}" class="btn w-50 border-end">Download CV</a>
          <a href="#contact" class="btn w-50 btn-scroll">Contact Me</a>
        </div>
      </div>
    </div>
    
    <!-- Right Column (Content) -->
    <div class="col-lg-8">
      {{ content }}
    </div>
  </div>
</div>
